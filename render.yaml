services:
  - type: web
    name: credishield-backend
    runtime: python
    rootDir: backend
    buildCommand: "apt-get update && apt-get install -y tesseract-ocr tesseract-ocr-hin && pip install -r requirements.txt"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TESSERACT_PATH
        value: /usr/bin/tesseract
